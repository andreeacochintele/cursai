<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wizzard of OS</title>
<style>
  :root{
    --bg:#141210;
    --panel:#1c1915;
    --amber:#e8a34c;
    --amber-dim:#a97a3c;
    --amber-faint:#5c4a30;
    --text:#f0e6d2;
    --text-dim:#9c9284;
    --danger:#c2543a;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family:"JetBrains Mono","IBM Plex Mono",ui-monospace,Consolas,monospace;
    display:flex;
    justify-content:center;
    align-items:stretch;
  }
  .app{
    width:100%;
    max-width:720px;
    display:flex;
    flex-direction:column;
    height:100vh;
    border-left:1px solid var(--amber-faint);
    border-right:1px solid var(--amber-faint);
  }
  header{
    padding:16px 20px 14px;
    border-bottom:1px solid var(--amber-faint);
    flex-shrink:0;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:12px;
  }
  header .title .prompt{
    color:var(--amber-dim);
    font-size:13px;
    letter-spacing:0.04em;
  }
  header h1{
    margin:4px 0 0;
    font-size:19px;
    font-weight:600;
    color:var(--amber);
    letter-spacing:0.02em;
  }
  header h1::before{
    content:"~$ ";
    color:var(--amber-faint);
  }
  .cursor{
    display:inline-block;
    width:8px;
    height:15px;
    background:var(--amber);
    margin-left:4px;
    vertical-align:-2px;
    animation:blink 1s steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0;}}

  .toolbar{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    justify-content:flex-end;
  }
  .tbtn{
    background:transparent;
    border:1px solid var(--amber-faint);
    color:var(--text-dim);
    padding:5px 10px;
    font-family:inherit;
    font-size:11.5px;
    border-radius:3px;
    cursor:pointer;
    white-space:nowrap;
    transition:border-color .15s, color .15s;
  }
  .tbtn:hover{border-color:var(--amber);color:var(--amber);}

  .session-panel{
    display:none;
    border-bottom:1px solid var(--amber-faint);
    padding:12px 20px;
    flex-shrink:0;
    max-height:160px;
    overflow-y:auto;
  }
  .session-panel.open{display:block;}
  .session-panel .empty{color:var(--text-dim);font-size:12.5px;}
  .session-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:6px 0;
    font-size:12.5px;
    border-bottom:1px dashed var(--amber-faint);
  }
  .session-row:last-child{border-bottom:none;}
  .session-row .sid{color:var(--text);}
  .session-row .sid.current{color:var(--amber);}
  .session-row button{
    background:transparent;
    border:1px solid var(--amber-faint);
    color:var(--text-dim);
    padding:3px 8px;
    font-family:inherit;
    font-size:11px;
    border-radius:3px;
    cursor:pointer;
  }
  .session-row button:hover{border-color:var(--amber);color:var(--amber);}

  .chips{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    padding:14px 20px;
    border-bottom:1px solid var(--amber-faint);
    flex-shrink:0;
  }
  .chip{
    background:transparent;
    border:1px solid var(--amber-faint);
    color:var(--text-dim);
    padding:6px 12px;
    font-family:inherit;
    font-size:12.5px;
    border-radius:3px;
    cursor:pointer;
    transition:border-color .15s, color .15s;
  }
  .chip:hover{
    border-color:var(--amber);
    color:var(--amber);
  }

  .log{
    flex:1;
    overflow-y:auto;
    padding:20px;
    display:flex;
    flex-direction:column;
    gap:16px;
  }
  .msg{
    max-width:88%;
    line-height:1.5;
    font-size:14px;
    white-space:pre-wrap;
    word-wrap:break-word;
  }
  .msg .who{
    display:block;
    font-size:11px;
    letter-spacing:0.08em;
    margin-bottom:4px;
  }
  .msg.user{
    align-self:flex-end;
    text-align:right;
  }
  .msg.user .who{color:var(--text-dim);}
  .msg.user .bubble{color:var(--text);}
  .msg.bot{align-self:flex-start;}
  .msg.bot .who{color:var(--amber-dim);}
  .msg.bot .bubble{color:var(--text);}
  .msg.error .who{color:var(--danger);}
  .msg.error .bubble{color:var(--danger);}

  .typing{
    align-self:flex-start;
    color:var(--text-dim);
    font-size:13px;
  }
  .typing span{
    display:inline-block;
    width:5px;
    height:5px;
    margin-right:3px;
    background:var(--amber-dim);
    border-radius:50%;
    animation:pulse 1.2s infinite;
  }
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes pulse{
    0%,60%,100%{opacity:.25;}
    30%{opacity:1;}
  }

  .stats-bar{
    padding:6px 20px;
    font-size:11px;
    color:var(--text-dim);
    border-top:1px solid var(--amber-faint);
    flex-shrink:0;
  }

  form{
    display:flex;
    gap:10px;
    padding:16px 20px;
    border-top:1px solid var(--amber-faint);
    flex-shrink:0;
  }
  input[type=text]{
    flex:1;
    background:var(--panel);
    border:1px solid var(--amber-faint);
    color:var(--text);
    font-family:inherit;
    font-size:14px;
    padding:11px 12px;
    border-radius:3px;
    outline:none;
  }
  input[type=text]:focus{border-color:var(--amber);}
  input[type=text]::placeholder{color:var(--text-dim);}
  button[type=submit]{
    background:var(--amber);
    border:none;
    color:#1c1712;
    font-family:inherit;
    font-weight:600;
    font-size:13px;
    padding:0 18px;
    border-radius:3px;
    cursor:pointer;
    transition:background .15s;
  }
  button[type=submit]:hover{background:#f2b662;}
  button[type=submit]:disabled{background:var(--amber-faint);cursor:not-allowed;}

  .log::-webkit-scrollbar, .session-panel::-webkit-scrollbar{width:8px;}
  .log::-webkit-scrollbar-thumb, .session-panel::-webkit-scrollbar-thumb{background:var(--amber-faint);border-radius:4px;}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="title">
      <div class="prompt">sysadmin // local session</div>
      <h1>Wizzard of OS<span class="cursor"></span></h1>
    </div>
    <div class="toolbar">
      <button class="tbtn" id="btn-new">new chat</button>
      <button class="tbtn" id="btn-sessions">sessions</button>
      <button class="tbtn" id="btn-export">export</button>
    </div>
  </header>

  <div class="session-panel" id="session-panel">
    <div class="empty">Loading sessions…</div>
  </div>

  <div class="chips" id="chips">
    <button class="chip" data-mode="fill" data-msg="Check the status of service: nginx">service status</button>
    <button class="chip" data-mode="fill" data-msg="Show me the last logs for service: nginx">service logs</button>
    <button class="chip" data-mode="send" data-msg="How much disk space do I have left?">disk usage</button>
    <button class="chip" data-mode="fill" data-msg="How do I add a new user with SSH access?">add user</button>
    <button class="chip" data-mode="fill" data-msg="Give me my lucky number, birth date: 31121993">lucky number</button>
  </div>

  <div class="log" id="log">
    <div class="msg bot">
      <span class="who">WIZZARD</span>
      <div class="bubble">Greetings, traveler. Tell me what ails your system — or pick one of the options above.</div>
    </div>
  </div>

  <div class="stats-bar" id="stats-bar"></div>

  <form id="chat-form">
    <input type="text" id="input" placeholder="type a command or a question..." autocomplete="off" />
    <button type="submit" id="send-btn">send</button>
  </form>
</div>

<script>
  const API_URL = ""; // same-origin; change to "http://127.0.0.1:8000" if the page is hosted elsewhere

  function newSessionId() {
    return "web-" + Math.random().toString(36).slice(2, 10);
  }

  let sessionId = newSessionId();

  const log = document.getElementById("log");
  const form = document.getElementById("chat-form");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("send-btn");
  const chips = document.getElementById("chips");
  const statsBar = document.getElementById("stats-bar");
  const sessionPanel = document.getElementById("session-panel");
  const btnNew = document.getElementById("btn-new");
  const btnSessions = document.getElementById("btn-sessions");
  const btnExport = document.getElementById("btn-export");

  function clearLog() {
    log.innerHTML = "";
  }

  function addMessage(who, text, cls) {
    const wrap = document.createElement("div");
    wrap.className = "msg " + cls;
    wrap.innerHTML = `<span class="who">${who}</span><div class="bubble"></div>`;
    wrap.querySelector(".bubble").textContent = text;
    log.appendChild(wrap);
    log.scrollTop = log.scrollHeight;
    return wrap;
  }

  function addTyping() {
    const el = document.createElement("div");
    el.className = "typing";
    el.id = "typing-indicator";
    el.innerHTML = "<span></span><span></span><span></span>";
    log.appendChild(el);
    log.scrollTop = log.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  function greet() {
    addMessage("WIZZARD", "Greetings, traveler. Tell me what ails your system — or pick one of the options above.", "bot");
  }

  async function refreshStats() {
    try {
      const res = await fetch(`${API_URL}/sessions/${sessionId}/stats`);
      if (!res.ok) { statsBar.textContent = ""; return; }
      const s = await res.json();
      statsBar.textContent = `session: ${sessionId}  ·  tokens in/out: ${s.total_input}/${s.total_output}  ·  cost: ${s.total_cost}`;
    } catch (e) {
      statsBar.textContent = "";
    }
  }

  async function sendMessage(text) {
    if (!text.trim()) return;
    addMessage("YOU", text, "user");
    input.value = "";
    sendBtn.disabled = true;
    addTyping();

    try {
      const res = await fetch(`${API_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: text })
      });

      removeTyping();

      if (!res.ok) {
        const errBody = await res.json().catch(() => ({}));
        addMessage("ERROR", errBody.detail || `Server responded with status ${res.status}`, "error");
        return;
      }

      const data = await res.json();
      addMessage("WIZZARD", data.reply, "bot");
      refreshStats();
    } catch (err) {
      removeTyping();
      addMessage("ERROR", "Can't reach the server. Make sure the backend (uvicorn app:app) is running, and check the URL.", "error");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    sendMessage(input.value);
  });

  chips.addEventListener("click", (e) => {
    const btn = e.target.closest(".chip");
    if (!btn) return;
    if (btn.dataset.mode === "fill") {
      input.value = btn.dataset.msg;
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);
    } else {
      sendMessage(btn.dataset.msg);
    }
  });

  // --- New chat ---
  btnNew.addEventListener("click", () => {
    sessionId = newSessionId();
    clearLog();
    greet();
    statsBar.textContent = "";
    sessionPanel.classList.remove("open");
  });

  // --- Sessions panel ---
  async function loadSessions() {
    sessionPanel.innerHTML = '<div class="empty">Loading sessions…</div>';
    try {
      const res = await fetch(`${API_URL}/sessions`);
      const data = await res.json();
      const ids = Array.from(new Set([...(data.saved_on_disk || []), ...(data.active_in_memory || [])]));

      if (ids.length === 0) {
        sessionPanel.innerHTML = '<div class="empty">No saved sessions yet — send a message to create one.</div>';
        return;
      }

      sessionPanel.innerHTML = "";
      ids.forEach((id) => {
        const row = document.createElement("div");
        row.className = "session-row";
        const isCurrent = id === sessionId;
        row.innerHTML = `
          <span class="sid ${isCurrent ? "current" : ""}">${id}${isCurrent ? " (current)" : ""}</span>
          <button data-id="${id}">resume</button>
        `;
        sessionPanel.appendChild(row);
      });
    } catch (e) {
      sessionPanel.innerHTML = '<div class="empty">Could not load sessions.</div>';
    }
  }

  sessionPanel.addEventListener("click", async (e) => {
    const btn = e.target.closest("button[data-id]");
    if (!btn) return;
    sessionId = btn.dataset.id;
    sessionPanel.classList.remove("open");
    clearLog();

    try {
      const res = await fetch(`${API_URL}/sessions/${sessionId}/history`);
      if (!res.ok) { greet(); return; }
      const history = await res.json();
      if (!history.length) { greet(); return; }
      history.forEach((m) => {
        if (m.role === "user") addMessage("YOU", m.content || "", "user");
        else if (m.role === "assistant") addMessage("WIZZARD", m.content || "", "bot");
      });
    } catch (e) {
      greet();
    }
    refreshStats();
  });

  btnSessions.addEventListener("click", () => {
    const willOpen = !sessionPanel.classList.contains("open");
    sessionPanel.classList.toggle("open", willOpen);
    if (willOpen) loadSessions();
  });

  // --- Export ---
  btnExport.addEventListener("click", () => {
    window.open(`${API_URL}/sessions/${sessionId}/export`, "_blank");
  });
</script>
</body>
</html>
